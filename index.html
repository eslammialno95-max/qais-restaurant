<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم قيس زلطن - القائمة الرسمية</title>
    <style>
        :root { --primary: #dc2626; --secondary: #eab308; --dark: #121212; --card-bg: #1a1a1a; --text-light: #fffdfa; --text-gray: #a3a3a3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); color: var(--text-light); }
        header { text-align: center; padding: 40px 20px; border-bottom: 2px solid var(--secondary); }
        .logo { font-size: 32px; font-weight: bold; color: var(--secondary); }
        .delivery-section { max-width: 600px; margin: 20px auto; padding: 20px; background: #1a1a1a; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .btn-messenger { display: inline-block; margin-top: 15px; background-color: #0084ff; color: white; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; }
        .menu-section { max-width: 600px; margin: 0 auto; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .food-card { background: #222; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        footer { text-align: center; padding: 20px; color: var(--text-gray); font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">مطعم قيس زلطن</div>
        <p>زلطن | ليبيا</p>
    </header>

    <div class="delivery-section">
        <h3>🚀 خدمة التوصيل متوفرة</h3>
        <p>زلطن، رقدالين، الجميل، زوارة</p>
        <a href="https://www.facebook.com/profile.php?id=100063523555230" target="_blank" class="btn-messenger">💬 راسلنا عبر فيسبوك</a>
    </div>

    <div class="menu-section">
        <div class="grid-container">
            <div class="food-card">طابونة</div>
            <div class="food-card">برجر</div>
            <div class="food-card">مقلوب</div>
            <div class="food-card">باقيت</div>
            <div class="food-card">تشيز</div>
            <div class="food-card">مشتعلة</div>
            <div class="food-card">كورنو</div>
            <div class="food-card">ليباني</div>
            <div class="food-card">بيتزا جبنة</div>
            <div class="food-card">بيتزا خضرة</div>
            <div class="food-card">بيتزا فقاع</div>
            <div class="food-card">بيتزا تن</div>
            <div class="food-card">بيتزا دجاج</div>
            <div class="food-card">بيتزا مشكلة</div>
            <div class="food-card">بيتزا دبل</div>
            <div class="food-card">وجبة رز</div>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 مطعم قيس زلطن</p>
        <div style="margin-top:10px;">
            عدد زوار الموقع: <img src="https://counter.optilink.us/get/@qais-restaurant" alt="counter">
        </div>
    </footer>

</body>
</html>
