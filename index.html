<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم قيس زلطن</title>
    <style>
        :root { --primary: #dc2626; --secondary: #eab308; --dark: #121212; }
        body { background-color: var(--dark); color: #fff; font-family: sans-serif; text-align: center; }
        .delivery-section { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 20px; }
        .btn-messenger { background: #0084ff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 20px; display: inline-block; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .food-card { background: #222; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>مطعم قيس زلطن</h1>
    <div class="delivery-section">
        <h3>🚀 خدمة التوصيل متوفرة</h3>
        <a href="https://www.facebook.com/profile.php?id=100063523555230" target="_blank" class="btn-messenger">💬 راسلنا عبر فيسبوك</a>
    </div>
            <div class="grid-container">
            <div class="food-card">بيتزا جبنة</div>
            <div class="food-card">بيتزا خضرة</div>
            <div class="food-card">بيتزا تن</div>
            <div class="food-card">بيتزا دجاج</div>
        </div>

        <footer>
            <div style="margin-top:20px; color:#a3a3a3;">
                زوار الموقع: <img src="https://counter.optilink.us/get/@qais-restaurant">
            </div>
        </footer>
    </body>
</html>
