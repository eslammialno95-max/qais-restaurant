<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم قيس زلطن</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; text-align: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .food-card { background: #222; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>مطعم قيس زلطن</h1>
    <div class="grid-container">
        <div class="food-card">طابونة</div>
        <div class="food-card">برجر</div>
        <div class="food-card">مقلوب</div>
        <div class="food-card">بيتزا</div>
    </div>
</body>
</html>
