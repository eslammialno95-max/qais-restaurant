<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم قيس زلطن - القائمة الرسمية</title>
    <style>
        :root {
            --primary: #dc2626;
            --secondary: #eab308;
            --dark: #121212;
            --card-bg: #1a1a1a;
            --text-light: #fffdfa;
            --text-gray: #a3a3a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--text-light);
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.85), #121212), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000');
            background-size: cover;
            background-attachment: fixed;
            background-position: center top;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(220, 38, 38, 0.4), transparent);
            border-bottom: 2px solid var(--secondary);
        }

        .logo-placeholder {
            font-size: 32px;
            font-weight: bold;
            color: var(--secondary);
            text-shadow: 2px 2px 8px rgba(234, 179, 8, 0.6);
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .btn-contact {
            display: inline-block;
            margin-top: 15px;
            background-color: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            border: 1px solid var(--secondary);
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.4);
        }
